name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build & publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # `dev` always tracks the latest build. Additional tags get attached
          # for branch HEADs, semver tags, and per-commit SHAs.
          tags: |
            type=raw,value=dev
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  purge:
    name: Purge old GHCR images
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OWNER: ${{ github.repository_owner }}
      PACKAGE: ${{ github.event.repository.name }}
    steps:
      - name: Delete old container versions
        run: |
          set -euo pipefail

          owner_type=$(gh api "/users/$OWNER" --jq .type)
          if [ "$owner_type" = "Organization" ]; then
            base="orgs/$OWNER"
          else
            base="users/$OWNER"
          fi

          # Keep the 20 most recent versions that don't carry a v* tag.
          # Versions tagged v* (release builds) are always retained.
          gh api --paginate "/$base/packages/container/$PACKAGE/versions" \
            --jq '.[] | select(((.metadata.container.tags // []) | map(test("^v")) | any) | not) | "\(.created_at) \(.id)"' \
            | sort -r \
            | tail -n +21 \
            | while read -r created_at id; do
                echo "Deleting version $id (created $created_at)"
                gh api -X DELETE "/$base/packages/container/$PACKAGE/versions/$id"
              done
